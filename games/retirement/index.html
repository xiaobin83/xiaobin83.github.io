<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 6px;
  }
  .game-container {
    background: #111118;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 10px;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 30px rgba(0, 200, 255, 0.05);
  }
  canvas {
    display: block;
    border: 1px solid #2a2a3a;
    background: #0d0d14;
    width: 100%;
    flex: 1;
    min-height: 0;
  }
  .info {
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
    color: #4a4a6a;
    font-size: 10px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .info span { color: #6a6a9a; }
</style>
</head>
<body>
<div class="game-container">
  <canvas id="game"></canvas>
  <div class="info">
    <span>&#11014; &#11015; &#11013; &#10145;</span>
    <span>WIREFRAME<span id="counter"> &#9670; 0</span></span>
  </div>
</div>
<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const counter = document.getElementById('counter');

  const SIZE = 32;
  const SPEED = 4;
  let x = 0, y = 0;
  let w = 0, h = 0;
  const keys = { up: false, down: false, left: false, right: false };
  let moveCount = 0;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    w = Math.round(rect.width * dpr);
    h = Math.round(rect.height * dpr);
    canvas.width = w;
    canvas.height = h;
    x = Math.min(x, Math.max(0, w - SIZE));
    y = Math.min(y, Math.max(0, h - SIZE));
  }

  window.addEventListener('resize', resize);
  resize();

  document.addEventListener('keydown', e => {
    switch(e.key) {
      case 'ArrowUp':    keys.up = true; e.preventDefault(); break;
      case 'ArrowDown':  keys.down = true; e.preventDefault(); break;
      case 'ArrowLeft':  keys.left = true; e.preventDefault(); break;
      case 'ArrowRight': keys.right = true; e.preventDefault(); break;
    }
  });
  document.addEventListener('keyup', e => {
    switch(e.key) {
      case 'ArrowUp':    keys.up = false; e.preventDefault(); break;
      case 'ArrowDown':  keys.down = false; e.preventDefault(); break;
      case 'ArrowLeft':  keys.left = false; e.preventDefault(); break;
      case 'ArrowRight': keys.right = false; e.preventDefault(); break;
    }
  });

  function update() {
    if (keys.up) y = Math.max(0, y - SPEED);
    if (keys.down) y = Math.min(h - SIZE, y + SPEED);
    if (keys.left) x = Math.max(0, x - SPEED);
    if (keys.right) x = Math.min(w - SIZE, x + SPEED);
    if (keys.up || keys.down || keys.left || keys.right) {
      moveCount++;
      counter.textContent = ' \u25C6 ' + moveCount;
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = '#1a1a2a';
    ctx.lineWidth = 1;
    for (let i = 0; i < w; i += 32) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
    }
    for (let i = 0; i < h; i += 32) {
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
    }

    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#00d4ff';
    ctx.strokeRect(x, y, SIZE, SIZE);
    ctx.shadowBlur = 0;

    ctx.strokeStyle = '#00d4ff44';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x - 6, y); ctx.lineTo(x, y); ctx.lineTo(x, y - 6);
    ctx.moveTo(x + SIZE + 6, y); ctx.lineTo(x + SIZE, y); ctx.lineTo(x + SIZE, y - 6);
    ctx.moveTo(x - 6, y + SIZE); ctx.lineTo(x, y + SIZE); ctx.lineTo(x, y + SIZE + 6);
    ctx.moveTo(x + SIZE + 6, y + SIZE); ctx.lineTo(x + SIZE, y + SIZE); ctx.lineTo(x + SIZE, y + SIZE + 6);
    ctx.stroke();

    requestAnimationFrame(gameLoop);
  }

  let lastTime = 0;
  const interval = 1000 / 60;

  function gameLoop(timestamp) {
    const delta = timestamp - lastTime;
    if (delta >= interval) {
      lastTime = timestamp - (delta % interval);
      update();
      draw();
    } else {
      requestAnimationFrame(gameLoop);
    }
  }

  requestAnimationFrame(gameLoop);
</script>
</body>
</html>
