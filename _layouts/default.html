<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <style>
    :root {
      --bg: #fdf6e3;
      --text: #333;
      --muted: #586e75;
      --link: #268bd2;
      --border: #eee8d5;
      --code-bg: #f0f0f0;
      --max-width: 800px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 16px; line-height: 1.7; color: var(--text); background: var(--bg);
      max-width: var(--max-width); margin: 0 auto; padding: 2rem 1.5rem;
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1, h2, h3 { margin: 1.5rem 0 0.5rem; color: var(--text); }
    h1 { font-size: 2rem; }
    h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    ul { padding-left: 1.5rem; margin: 0.5rem 0 1rem; }
    li { margin: 0.35rem 0; }
    .site-header { margin-bottom: 2rem; }
    .site-title { font-size: 1.6rem; font-weight: 700; }
    .site-title a { color: var(--text); }
    .site-nav { margin-top: 0.5rem; }
    .site-nav a { margin-right: 1rem; font-size: 0.95rem; color: var(--muted); }
    .site-footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--muted); }
    .post-list { list-style: none; padding-left: 0; }
    .post-list li { margin-bottom: 1.5rem; }
    .post-meta { font-size: 0.85rem; color: var(--muted); }
    .post-link { display: block; font-size: 1.2rem; font-weight: 600; }
    blockquote {
      border-left: 4px solid #ccc; padding: 0.5rem 1rem; margin: 1rem 0;
      color: var(--muted); background: #f9f9f9; border-radius: 0 4px 4px 0;
    }
    code { background: var(--code-bg); padding: 0.15em 0.4em; border-radius: 3px; font-size: 0.9em; }
    pre { background: var(--code-bg); padding: 1rem; border-radius: 4px; overflow-x: auto; margin: 1rem 0; }
    pre code { background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid var(--border); padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f5f5f5; }
    .social-links a { margin-right: 1rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-title"><a href="/">{{ site.title }}</a></div>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/about/">About</a>
      <a href="https://github.com/xiaobin83">GitHub</a>
    </nav>
  </header>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="social-links">
      <a href="https://github.com/xiaobin83">GitHub</a>
      <a href="https://twitter.com/xiaobin_huang">Twitter</a>
    </div>
    <p>{{ site.title }} &copy; {{ 'now' | date: "%Y" }}</p>
  </footer>
</body>
</html>
